<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <title>FileZone - Free Online File Tools | PDF, Image, Convert & More</title>
    <meta name="description" content="FileZone offers 30+ free online tools to merge PDFs, compress images, convert files, resize photos, generate QR codes and more. 100% browser-based — no uploads, no registration, no limits." />
    <meta name="keywords" content="PDF tools, merge PDF, compress PDF, split PDF, image compressor, resize image, convert image, file converter, online tools free, word counter, QR code generator, JPG to PDF, PNG to JPG, calculator online" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="author" content="FileZone" />
    <meta name="theme-color" content="#3b82f6" />

    <!-- Canonical -->
    <link rel="canonical" href="https://filezone.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FileZone" />
    <meta property="og:title" content="FileZone - Free Online File Tools" />
    <meta property="og:description" content="Merge PDFs, compress images, convert files and more — all free, no sign-up, 100% browser-based." />
    <meta property="og:url" content="https://filezone.app/" />
    <meta property="og:image" content="https://filezone.app/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FileZone - Free Online File Tools" />
    <meta name="twitter:description" content="30+ free browser-based tools for PDFs, images, file conversion, and more." />
    <meta name="twitter:image" content="https://filezone.app/opengraph.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FileZone",
      "url": "https://filezone.app",
      "description": "Free online tools to merge PDFs, compress images, convert files, and more. 100% browser-based.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://filezone.app/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FileZone",
      "url": "https://filezone.app",
      "logo": "https://filezone.app/favicon.svg",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "hello@filezone.app"
      }
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "FileZone",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "Free online file toolkit with PDF tools, image tools, converters, calculators, and more.",
      "url": "https://filezone.app",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1200"
      }
    }
    </script>

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
