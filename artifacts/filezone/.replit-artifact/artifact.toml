kind = "web"
previewPath = "/"
title = "FileZone - Online File Tools"
version = "1.0.0"
id = "artifacts/filezone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21727

[services.development]
run = "pnpm --filter @workspace/filezone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/filezone", "run", "build" ]
publicDir = "artifacts/filezone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21727"
BASE_PATH = "/"
