services:
  # Backend API Server (Express)
  - type: web
    name: filezone-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: filezone-db
          property: connectionString

  # Frontend (Static Site)
  - type: web
    name: filezone-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: pnpm install && PORT=3000 BASE_PATH=/ pnpm --filter @workspace/filezone run build
    staticPublishPath: artifacts/filezone/dist/public
    routes:
      - type: rewrite
        source: /api/*
        destination: https://filezone-api.onrender.com/api/$1
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: filezone-db
    region: oregon
    plan: free
    databaseName: filezone
